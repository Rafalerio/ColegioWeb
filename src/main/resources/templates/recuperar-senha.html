<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha | Colégio Aprendizagem</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        .message-box { padding: 10px; border-radius: 4px; display: none; margin-bottom: 15px; }
        .message-success { background: #dcfce7; color: #166534; }
        .message-error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <main class="login">
        <section class="left">
            <img src="/images/school_students.png" alt="Foto de estudantes">
        </section>
    
        <section class="right">
            <form id="formRecuperacao" class="login-box" th:action="@{/recuperar-senha}" th:object="${dto}" method="POST">
                <h2>Portal Institucional</h2>
                <h1>Redefinição de Acesso</h1>
                <p style="color: #52525b; margin-bottom: 20px; font-size: 0.9rem;">
                    Informe seu e-mail e CPF cadastrados para definir uma nova senha.
                </p>

                <!-- Erro de regra de negócio -->
                <div th:if="${erro}" class="message-box message-error" style="display: block;" th:text="${erro}"></div>
                
                <!-- Erros de validação (DTO) -->
                <div th:if="${#fields.hasErrors('email')}" class="message-box message-error" style="display: block;" th:errors="*{email}"></div>
                <div th:if="${#fields.hasErrors('cpf')}" class="message-box message-error" style="display: block;" th:errors="*{cpf}"></div>
                <div th:if="${#fields.hasErrors('novaSenha')}" class="message-box message-error" style="display: block;" th:errors="*{novaSenha}"></div>

                <label>Email</label>
                <input type="email" id="email" th:field="*{email}" required>

                <label>CPF</label>
                <input type="text" id="cpf" th:field="*{cpf}" required>

                <label>Nova Senha</label>
                <input type="password" id="novaSenha" th:field="*{novaSenha}" minlength="6" required>
                
                <button type="submit">Redefinir Senha</button>
                <div class="cadastro">
                    <a href="/login">Voltar ao Login</a>
                </div>
            </form> 
        </section>
    </main>

    <script src="/js/script.js"></script>
</body>
</html>
