<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Colégio Aprendizagem</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>

<main class="login">
    <section class="left">
        <img src="/images/school_students.png" alt="Foto de estudantes">
    </section>

    <section class="right">
        <form th:action="@{/cadastro}" method="post" class="login-box">
            <h2>Colégio Aprendizagem</h2>
            <h1>Matrícula</h1>

            <div id="mensagem-erro" style="color: red; margin-bottom: 15px; display: none;"></div>
            <div id="mensagem-sucesso" style="color: green; margin-bottom: 15px; display: none;">Matrícula realizada com sucesso!</div>

            <h3 style="margin-top: 10px;">Dados do Aluno</h3>
            <label>Nome do Aluno</label>
            <input type="text" name="nomeAluno" required>

            <label>CPF do Aluno</label>
            <input type="text" name="cpfAluno" class="cpf-mask" maxlength="11" required>

            <label>RG do Aluno</label>
            <input type="text" name="rgAluno" maxlength="10" required>

            <label>Data de Nascimento do Aluno</label>
            <input type="date" name="dataNascimentoAluno" style="width: 100%;" required>

            <h3 style="margin-top: 20px;">Dados do Responsável</h3>
            <label>Nome do Responsável</label>
            <input type="text" name="nomeResponsavel" required>

            <label>CPF do Responsável</label>
            <input type="text" name="cpfResponsavel" class="cpf-mask" maxlength="11" required>

            <label>RG do Responsável</label>
            <input type="text" name="rgResponsavel" maxlength="10" required>

            <label>Telefone do Responsável</label>
            <input type="tel" name="telefoneResponsavel" id="telefone" maxlength="14" required>

            <label>E-mail do Responsável</label>
            <input type="email" name="emailResponsavel" required>

            <label>Endereço</label>
            <input type="text" name="endereco" required>

            <label>Senha</label>
            <input type="password" name="senhaResponsavel" required>

            <button type="submit" style="margin-top: 15px;">Matricular</button>
            <div class="cadastro">
                <span>Já tem uma conta?</span>
                <a href="/login">Login</a>
            </div>
        </form>
    </section>
</main>

<script src="/js/script.js?v=2"></script>
</body>
</html>
