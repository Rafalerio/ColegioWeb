<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avisos | Portal do Professor</title>
    <link rel="icon" type="image/x-icon" href="/images/school_logo.png">
    <link rel="stylesheet" href="/css/portal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
          rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body class="sb-expanded">

<header class="portal-header">

    <div class="usuario">
        <img src="/images/user_logo.png">

        <div>
            <p>RODRIGO MATTOS</p>
            <p>PROFESSOR</p>
        </div>
    </div>

</header>

<aside>
    <nav>
        <ul>
            <li>
                <button data-resize-btn>
                    <i class="bx bx-menu"></i>
                </button>
            </li>
            <li>
                <a href="/professor/avisos" class="active">
                    <i class="bx bxs-megaphone"></i>
                    <span>Avisos</span>
                </a>
            </li>
            <li>
                <a href="/professor/avaliacoes">
                    <i class="bx bx-line-chart"></i>
                    <span>Avaliações</span>
                </a>
            </li>
            <li>
                <a href="/professor/disciplinas">
                    <i class="bx bx-book"></i>
                    <span>Disciplinas</span>
                </a>
            </li>
            <li>
                <a href="/professor/sistema-faltas">
                    <i class='bx bx-bar-chart-square'></i>
                    <span>Sistema de Faltas</span>
                </a>
            </li>
            <li>
                <a href="/professor/situacao-aluno">
                    <i class='bx bx-search-alt'></i>
                    <span>Situação do Aluno</span>
                </a>
            </li>
            <li class="logout">
                <a href="/">
                    <i class="bx bx-log-out"></i>
                    <span>Sair</span>
                </a>
            </li>
        </ul>
    </nav>
</aside>

<main>
    <h3>Avisos</h3>
    <hr>

    <div class="criar-aviso">
        <h4>Novo Aviso</h4>

        <input type="text" placeholder="Título">

        <textarea rows="5" placeholder="Digite o aviso..."></textarea>

        <button>Criar Aviso</button>
    </div>

</main>

<script src="/js/sidebar.js"></script>
</body>
</html>
