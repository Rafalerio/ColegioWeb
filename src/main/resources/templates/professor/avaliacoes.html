<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliações | Portal do Professor</title>
    <link rel="icon" type="image/x-icon" href="/images/school_logo.png">
    <link rel="stylesheet" href="/css/portal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
          rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body class="sb-expanded">

<header th:replace="~{fragments/header :: professor-header}"></header>

<aside>
    <nav>
        <ul>
            <li>
                <button data-resize-btn>
                    <i class="bx bx-menu"></i>
                </button>
            </li>
            <li>
                <a href="/professor/avisos">
                    <i class="bx bxs-megaphone"></i>
                    <span>Avisos</span>
                </a>
            </li>
            <li>
                <a href="/professor/avaliacoes" class="active">
                    <i class="bx bx-line-chart"></i>
                    <span>Avaliações</span>
                </a>
            </li>
            <li>
                <a href="/professor/disciplinas">
                    <i class="bx bx-book"></i>
                    <span>Disciplinas</span>
                </a>
            </li>
            <li>
                <a href="/professor/sistema-faltas">
                    <i class='bx bx-bar-chart-square'></i>
                    <span>Sistema de Faltas</span>
                </a>
            </li>
            <li>
                <a href="/professor/situacao-aluno">
                    <i class='bx bx-search-alt'></i>
                    <span>Situação do Aluno</span>
                </a>
            </li>
            <li class="logout">
                <a href="/">
                    <i class="bx bx-log-out"></i>
                    <span>Sair</span>
                </a>
            </li>
        </ul>
    </nav>
</aside>

<main>
    <h3>Avaliações</h3>
    <hr>

    <div class="avaliacoes-professor">
        <button onclick="abrirModalAvaliacao()" class="btn-criar">
            Nova Avaliação
        </button>

        <div class="avaliacao">
            <div>
                <h3>Prova 1</h3>
                <p>Matemática - 3º Ano B</p>
            </div>

            <div>
                <span>20/06/2026</span>
            </div>

            <div class="acoes">
                <button onclick="abrirModalNotas()">Lançar Notas</button>
                <button>Excluir</button>
            </div>
        </div>
    </div>

    <div id="modalAvaliacao" class="modal">
        <form class="avaliacao-form">
            <input type="text" placeholder="Nome da Avaliação">

            <select>
                <option>Matemática</option>
            </select>

            <select>
                <option>3° Ano B</option>
            </select>

            <input type="date">

            <input type="number" placeholder="Valor da prova">

            <button type="submit">Criar Avaliação</button>
        </form>
    </div>

    <div id="modalNotas" class="modal">
        <div class="lancar-notas">
            <div class="aluno-nota">
                <span>Carlinhos Horsen</span>
                <input type="number" min="0" max="10" step="0.1">
            </div>

            <div class="aluno-nota">
                <span>Dalva Nopanten</span>
                <input type="number" min="0" max="10" step="0.1">
            </div>

            <button>Salvar Notas</button>
        </div>
    </div>

</main>

<script src="/js/sidebar.js"></script>
<script src="/js/professor-avaliacoes.js"></script>
</body>
</html>
