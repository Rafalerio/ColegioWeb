<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliações | Portal do Professor</title>
    <link rel="icon" type="image/x-icon" href="/images/school_logo.png">
    <link rel="stylesheet" href="/css/portal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
          rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body class="sb-expanded">

<header th:replace="~{fragments/header :: professor-header}"></header>

<aside>
    <nav>
        <ul>
            <li>
                <button data-resize-btn>
                    <i class="bx bx-menu"></i>
                </button>
            </li>
            <li>
                <a href="/professor/avisos">
                    <i class="bx bxs-megaphone"></i>
                    <span>Avisos</span>
                </a>
            </li>
            <li>
                <a href="/professor/avaliacoes" class="active">
                    <i class="bx bx-line-chart"></i>
                    <span>Avaliações</span>
                </a>
            </li>
            <li>
                <a href="/professor/disciplinas">
                    <i class="bx bx-book"></i>
                    <span>Disciplinas</span>
                </a>
            </li>
            <li>
                <a href="/professor/sistema-faltas">
                    <i class='bx bx-bar-chart-square'></i>
                    <span>Sistema de Faltas</span>
                </a>
            </li>
            <li>
                <a href="/professor/situacao-aluno">
                    <i class='bx bx-search-alt'></i>
                    <span>Situação do Aluno</span>
                </a>
            </li>
            <li class="logout">
                <a href="/">
                    <i class="bx bx-log-out"></i>
                    <span>Sair</span>
                </a>
            </li>
        </ul>
    </nav>
</aside>

<main>
    <h3>Avaliações</h3>
    <hr>

    <div class="avaliacoes-professor">
        <button onclick="abrirModalAvaliacao()" class="btn-criar">
            Nova Avaliação
        </button>

        <div th:each="t : ${tarefas}" class="avaliacao">
            <div>
                <h3 th:text="${t.titulo}">Prova 1</h3>
                <p th:text="${t.disciplina.nome + ' - ' + t.turma.nome}">Matemática - 3º Ano B</p>
                <p style="font-size: 0.8rem; color: #777;" th:text="${t.tipo}">PROVA</p>
            </div>

            <div>
                <span th:text="${#temporals.format(t.dataEntrega, 'dd/MM/yyyy')}">20/06/2026</span>
            </div>

            <div class="acoes">
                <button th:onclick="'abrirModalNotas(' + ${t.id} + ')'">Lançar Notas</button>
            </div>
        </div>
        
        <div th:if="${#lists.isEmpty(tarefas)}">
            <p style="color: #666; margin-top: 15px;">Nenhuma avaliação lançada ainda.</p>
        </div>
    </div>

    <div id="modalAvaliacao" class="modal">
        <form class="avaliacao-form" id="form-criar-avaliacao">
            <input type="text" id="input-titulo" placeholder="Título da Avaliação" required>
            <input type="text" id="input-descricao" placeholder="Descrição da Avaliação" required>

            <select id="select-tipo" required>
                <option value="">Selecione o Tipo</option>
                <option value="PROVA">Prova</option>
                <option value="TRABALHO">Trabalho</option>
                <option value="EXERCÍCIO">Exercício</option>
            </select>

            <select id="select-turma-disciplina" required>
                <option value="">Selecione a Turma e Disciplina</option>
                <option th:each="td : ${turmasEDisciplinas}" 
                        th:value="${td.turmaId + '-' + td.disciplinaId}"
                        th:data-turmaid="${td.turmaId}"
                        th:data-disciplinaid="${td.disciplinaId}"
                        th:text="${td.disciplinaNome + ' - ' + td.turmaNome}"></option>
            </select>

            <input type="date" id="input-data" required>

            <button type="submit" id="btn-salvar-avaliacao">Criar Avaliação</button>
        </form>
    </div>

    <div id="modalNotas" class="modal">
        <div class="lancar-notas" id="container-entregas-notas">
            <!-- Entregas serão listadas aqui -->
        </div>
    </div>

</main>

<script src="/js/sidebar.js"></script>
<script src="/js/professor-avaliacoes.js"></script>
</body>
</html>
