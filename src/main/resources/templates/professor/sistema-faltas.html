<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Faltas | Portal do Professor</title>
    <link rel="icon" type="image/x-icon" href="/images/school_logo.png">
    <link rel="stylesheet" href="/css/portal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
          rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body class="sb-expanded">

<header th:replace="~{fragments/header :: professor-header}"></header>

<aside>
    <nav>
        <ul>
            <li>
                <button data-resize-btn>
                    <i class="bx bx-menu"></i>
                </button>
            </li>
            <li>
                <a href="/professor/avisos">
                    <i class="bx bxs-megaphone"></i>
                    <span>Avisos</span>
                </a>
            </li>
            <li>
                <a href="/professor/avaliacoes">
                    <i class="bx bx-line-chart"></i>
                    <span>Avaliações</span>
                </a>
            </li>
            <li>
                <a href="/professor/disciplinas">
                    <i class="bx bx-book"></i>
                    <span>Disciplinas</span>
                </a>
            </li>
            <li>
                <a href="/professor/sistema-faltas" class="active">
                    <i class='bx bx-bar-chart-square'></i>
                    <span>Sistema de Faltas</span>
                </a>
            </li>
            <li>
                <a href="/professor/situacao-aluno">
                    <i class='bx bx-search-alt'></i>
                    <span>Situação do Aluno</span>
                </a>
            </li>
            <li class="logout">
                <a href="/">
                    <i class="bx bx-log-out"></i>
                    <span>Sair</span>
                </a>
            </li>
        </ul>
    </nav>
</aside>

<main>
    <h3>Sistema de Faltas</h3>
    <hr>

    <div class="faltas-professor">
        <button class="btn-criar" onclick="abrirModalFalta()">
            Registrar Falta
        </button>

        <div class="faltas-card">
            <div>
                <h3>Carlinhos Horsen</h3>
                <p>Matemática - 3° Ano B</p>
            </div>

            <div>
                <span>5 Faltas</span>
            </div>

            <div class="acoes">
                <button onclick="abrirModalDetalhesFalta()">
                    Detalhes
                </button>
            </div>
        </div>
    </div>

    <div id="modalFalta" class="modal">
        <form class="falta-form">
            <h2>Registrar Falta</h2>

            <select>
                <option>3° Ano B</option>
            </select>

            <select>
                <option>Dalva Nopanten</option>
            </select>

            <input type="date">

            <button type="submit">
                Registrar Falta
            </button>
        </form>
    </div>

    <div id="modalDetalhesFalta" class="modal">
        <div class="faltas-lista">
            <h2>Carlinhos Horsen</h2>

            <div class="faltas-registro">
                <span>10/06/2026</span>
                <button>Excluir</button>
            </div>

            <div class="faltas-registro">
                <span>17/06/2026</span>
                <button>Excluir</button>
            </div>
        </div>
    </div>
</main>

<script src="/js/sidebar.js"></script>
<script src="/js/professor-sistema-faltas.js"></script>
</body>
</html>
