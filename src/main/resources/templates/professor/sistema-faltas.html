<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Faltas | Portal do Professor</title>
    <link rel="icon" type="image/x-icon" href="/images/school_logo.png">
    <link rel="stylesheet" href="/css/portal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
          rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body class="sb-expanded">

<header th:replace="~{fragments/header :: professor-header}"></header>

<aside>
    <nav>
        <ul>
            <li>
                <button data-resize-btn>
                    <i class="bx bx-menu"></i>
                </button>
            </li>
            <li>
                <a href="/professor/avisos">
                    <i class="bx bxs-megaphone"></i>
                    <span>Avisos</span>
                </a>
            </li>
            <li>
                <a href="/professor/avaliacoes">
                    <i class="bx bx-line-chart"></i>
                    <span>Avaliações</span>
                </a>
            </li>
            <li>
                <a href="/professor/disciplinas">
                    <i class="bx bx-book"></i>
                    <span>Disciplinas</span>
                </a>
            </li>
            <li>
                <a href="/professor/sistema-faltas" class="active">
                    <i class='bx bx-bar-chart-square'></i>
                    <span>Sistema de Faltas</span>
                </a>
            </li>
            <li>
                <a href="/professor/situacao-aluno">
                    <i class='bx bx-search-alt'></i>
                    <span>Situação do Aluno</span>
                </a>
            </li>
            <li class="logout">
                <a href="/">
                    <i class="bx bx-log-out"></i>
                    <span>Sair</span>
                </a>
            </li>
        </ul>
    </nav>
</aside>

<main>
    <h3>Sistema de Faltas</h3>
    <hr>

    <div class="faltas-professor">
        <button class="btn-criar" onclick="abrirModalFalta()">
            Registrar Falta
        </button>

        <div id="lista-faltas-container">
            <div th:each="f : ${resumoFaltas}" class="faltas-card">
                <div>
                    <h3 th:text="${f.alunoNome}">Nome do Aluno</h3>
                    <p th:text="${f.disciplinaNome + ' - ' + f.turmaNome}">Disciplina - Turma</p>
                </div>
                <div>
                    <span th:text="${f.quantidadeFaltas + ' Falta(s)'}">0 Falta(s)</span>
                </div>
                <div class="acoes">
                    <button th:attr="onclick=|abrirModalDetalhesFalta(${f.alunoId}, '${f.alunoNome}', ${f.disciplinaId})|">
                        Detalhes
                    </button>
                </div>
            </div>
            <p th:if="${#lists.isEmpty(resumoFaltas)}">Nenhuma falta registrada.</p>
        </div>
    </div>

    <div id="modalFalta" class="modal">
        <form id="form-registrar-falta" class="falta-form">
            <h2>Registrar Falta</h2>

            <select id="select-turma-disciplina" required>
                <option value="">Selecione a Turma e Disciplina</option>
                <option th:each="t : ${turmasEDisciplinas}" 
                        th:value="${t.turmaId + '-' + t.disciplinaId}"
                        th:data-turmaid="${t.turmaId}"
                        th:data-disciplinaid="${t.disciplinaId}"
                        th:text="${t.disciplinaNome + ' - ' + t.turmaNome}"></option>
            </select>

            <select id="select-aluno" required disabled>
                <option value="">Selecione um Aluno</option>
            </select>

            <input type="date" id="input-data-falta" required>

            <button type="submit" id="btn-salvar-falta">
                Registrar Falta
            </button>
        </form>
    </div>

    <div id="modalDetalhesFalta" class="modal">
        <div class="faltas-lista" id="detalhes-faltas-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 id="titulo-detalhes-aluno" style="margin-bottom: 0;">Detalhes do Aluno</h2>
                <button type="button" onclick="fecharModalDetalhesFalta()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #555;">&times;</button>
            </div>
            <div id="lista-datas-faltas">
                <!-- Registros dinâmicos -->
            </div>
        </div>
    </div>
</main>

<script src="/js/sidebar.js"></script>
<script src="/js/professor-sistema-faltas.js"></script>
</body>
</html>
