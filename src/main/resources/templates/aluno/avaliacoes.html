<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliações | Portal do Aluno</title>
    <link rel="icon" type="image/x-icon" href="/images/school_logo.png">
    <link rel="stylesheet" href="/css/portal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
          rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body class="sb-expanded">

<header th:replace="~{fragments/header :: aluno-header}"></header>

<aside>
    <nav>
        <ul>
            <li>
                <button data-resize-btn>
                    <i class="bx bx-menu"></i>
                </button>
            </li>
            <li>
                <a href="/aluno/avisos">
                    <i class="bx bxs-megaphone"></i>
                    <span>Avisos</span>
                </a>
            </li>
            <li>
                <a href="/aluno/calendario">
                    <i class="bx bx-calendar-event"></i>
                    <span>Calendário</span>
                </a>
            </li>
            <li>
                <a href="/aluno/avaliacoes" class="active">
                    <i class="bx bx-line-chart"></i>
                    <span>Avaliações</span>
                </a>
            </li>
            <li>
                <a href="/aluno/disciplinas">
                    <i class="bx bx-book"></i>
                    <span>Disciplinas</span>
                </a>
            </li>
            <li>
                <a href="/aluno/sistema-faltas">
                    <i class='bx bx-bar-chart-square'></i>
                    <span>Sistema de Faltas</span>
                </a>
            </li>
            <li class="logout">
                <a href="/">
                    <i class="bx bx-log-out"></i>
                    <span>Sair</span>
                </a>
            </li>
        </ul>
    </nav>
</aside>

<main>
    <h3>Avaliações</h3>
    <hr>

    <div class="avaliacoes">

        <div th:each="e : ${entregas}" class="card-avaliacao">
            <div class="info">
                <h2 th:text="${e.disciplinaNome}">Matemática</h2>

                <div class="dados">
                    <span><i class="bx bx-book-content"></i><span th:text="${e.tituloTarefa}">Título</span></span>
                    <span><i class="bx bx-calendar"></i><span th:text="${#temporals.format(e.dataLimite, 'dd/MM/yyyy')}">15/06/2026</span></span>
                    <span th:if="${e.status == 'AVALIADO'}"><i class="bx bx-check-circle"></i>Nota: <strong th:text="${e.nota}">10</strong></span>
                    <span th:if="${e.status == 'ENTREGUE'}"><i class="bx bx-time"></i>Aguardando nota</span>
                    <span th:if="${e.status == 'PENDENTE'}"><i class="bx bx-error-circle"></i>Pendente</span>
                </div>

                <div class="botoes">
                    <button th:if="${e.status == 'PENDENTE'}" class="btn-continuar" th:onclick="'entregarAvaliacao(' + ${e.entregaId} + ')'">
                        Marcar como Feito
                    </button>
                    <button th:if="${e.status != 'PENDENTE'}" class="btn-continuar" disabled style="background:#aaa; cursor:not-allowed;">
                        Entregue
                    </button>

                    <button class="btn-detalhes" th:onclick="'alert(\'' + ${e.descricaoTarefa} + '\')'">
                        Detalhes
                    </button>
                </div>
            </div>

            <div class="progresso">
                <div class="circulo">
                    <span th:text="${e.status == 'AVALIADO' ? e.nota : (e.status == 'ENTREGUE' ? '---' : '0%')}">64%</span>
                </div>
            </div>

        </div>

        <div th:if="${#lists.isEmpty(entregas)}">
            <p style="color: #666; margin-top: 15px;">Nenhuma avaliação disponível.</p>
        </div>

    </div>
</main>

<script src="/js/sidebar.js"></script>
<script src="/js/aluno-avaliacoes.js"></script>
</body>
</html>
