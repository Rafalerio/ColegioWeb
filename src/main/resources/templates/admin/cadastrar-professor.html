<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cadastrar Professor | Admin</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #0f172a;
            margin-top: 0;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .alert {
            background-color: #fef2f2;
            color: #991b1b;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid #f87171;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2563eb;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-item input {
            width: auto;
        }

        .nav-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Cadastrar Novo Professor</h1>

        <div th:if="${erro}" class="alert" th:text="${erro}"></div>

        <form th:action="@{/admin/cadastrar-professor}" th:object="${professorDto}" method="post">

            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" th:field="*{nome}" placeholder="Ex: João da Silva">
                <div class="error-message" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Erro de nome</div>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" th:field="*{email}" placeholder="Ex: joao@escola.com">
                <div class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Erro de email
                </div>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" th:field="*{senha}">
                <div class="error-message" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}">Erro de senha
                </div>
            </div>

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" th:field="*{cpf}" placeholder="Apenas números">
                    <div class="error-message" th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}">Erro</div>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="rg">RG</label>
                    <input type="text" id="rg" th:field="*{rg}">
                    <div class="error-message" th:if="${#fields.hasErrors('rg')}" th:errors="*{rg}">Erro</div>
                </div>
            </div>

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" th:field="*{telefone}">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="dataNascimento">Data de Nascimento</label>
                    <input type="date" id="dataNascimento" th:field="*{dataNascimento}">
                </div>
            </div>

            <div class="form-group">
                <label for="endereco">Endereço</label>
                <input type="text" id="endereco" th:field="*{endereco}">
            </div>

            <div class="form-group">
                <label>Disciplinas Qualificadas (Selecione uma ou mais)</label>
                <div class="checkbox-group">
                    <div class="checkbox-item" th:each="disciplina : ${disciplinas}">
                        <input type="checkbox" th:id="${'disc_' + disciplina.id}" th:value="${disciplina.id}"
                            th:field="*{disciplinasIds}">
                        <label th:for="${'disc_' + disciplina.id}" th:text="${disciplina.nome}"
                            style="margin: 0; font-weight: 400;"></label>
                    </div>
                </div>
                <div class="error-message" th:if="${#fields.hasErrors('disciplinasIds')}" th:errors="*{disciplinasIds}">
                    Erro de disciplina</div>
            </div>

            <button type="submit">Finalizar Cadastro</button>
        </form>

        <a href="/admin/turmas" class="nav-link">← Voltar para Turmas</a>
    </div>
</body>

</html>
